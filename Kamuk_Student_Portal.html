<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kamuk School — Student Portal</title>
<meta name="theme-color" content="#1B9BD1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Kamuk Portal">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --kb:#1B9BD1;--kbd:#1478A8;--kbg:#E8F5FC;
  --ko:#F5A623;--kog:#FEF3E2;
  --kg:#5CB85C;--kgg:#EBF7EB;
  --rd:#A32D2D;--rg:#FCEBEB;
  --gray:#F4F6F8;--border:#E2E8F0;--text:#1E293B;--t2:#64748B;--t3:#94A3B8;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#F0F4FA;color:var(--text);min-height:100vh;}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1478A8,#1B9BD1,#5CB85C);}
.login-box{background:white;border-radius:20px;padding:2.5rem;width:100%;max-width:360px;box-shadow:0 16px 48px rgba(0,0,0,0.15);}

/* PORTAL LAYOUT */
.portal-wrap{display:flex;min-height:100vh;}
.portal-sidebar{width:200px;background:white;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;overflow-y:auto;}
.ps-header{background:var(--kb);padding:1rem;display:flex;flex-direction:column;align-items:center;gap:4px;}
.ps-name{font-size:12px;font-weight:700;color:white;text-align:center;margin-top:4px;}
.ps-level{font-size:10px;color:rgba(255,255,255,0.65);margin-top:2px;}
.ps-nav{flex:1;padding:0.75rem 0.5rem;}
.ps-item{display:flex;align-items:center;gap:8px;padding:0.6rem 0.75rem;border-radius:var(--r);cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;margin-bottom:2px;transition:all 0.15s;}
.ps-item:hover{background:var(--kbg);color:var(--kb);}
.ps-item.active{background:var(--kbg);color:var(--kb);font-weight:700;}
.ps-item i{font-size:16px;flex-shrink:0;}
.ps-footer{padding:0.75rem;border-top:1px solid var(--border);}
.ps-score{background:var(--kb);border-radius:var(--rl);padding:10px;text-align:center;margin-bottom:8px;}
.ps-score-num{font-size:24px;font-weight:900;color:white;line-height:1;}
.ps-score-label{font-size:10px;color:rgba(255,255,255,0.7);margin-top:2px;}
.ps-logout{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:var(--r);cursor:pointer;color:var(--t3);font-size:12px;transition:all 0.15s;}
.ps-logout:hover{color:var(--rd);background:var(--rg);}
.portal-main{margin-left:200px;flex:1;padding:1.5rem;min-height:100vh;}

/* CARDS */
.card{background:white;border:1px solid var(--border);border-radius:var(--rl);padding:1.25rem;margin-bottom:1rem;}
.card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:var(--r);font-size:13px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:opacity 0.15s;}
.btn:hover{opacity:0.88;}
.btn-blue{background:var(--kb);color:white;}
.btn-orange{background:var(--ko);color:white;}
.btn-outline{background:white;color:var(--t2);border:1px solid var(--border);}
.btn-sm{padding:5px 10px;font-size:12px;}
.inp{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-family:inherit;color:var(--text);background:white;}
.inp:focus{outline:none;border-color:var(--kb);}
textarea.inp{resize:vertical;min-height:70px;line-height:1.6;}
.form-group{margin-bottom:12px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:5px;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;}
.b-adv{background:#E8F5FC;color:#1478A8;}.b-func{background:#FEF3E2;color:#B07318;}
.b-emer{background:#EBF7EB;color:#3D8B3D;}.b-surv{background:#FCEBEB;color:#A32D2D;}
.kbar{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.kbar-name{font-size:12px;font-weight:700;color:var(--t2);width:145px;flex-shrink:0;}
.kbar-bg{flex:1;height:10px;background:var(--gray);border-radius:5px;overflow:hidden;}
.kbar-fill{height:100%;border-radius:5px;transition:width 0.5s;}
.kbar-val{font-size:13px;font-weight:800;width:36px;text-align:right;flex-shrink:0;}
.ib{padding:10px 14px;border-radius:var(--r);font-size:13px;line-height:1.6;margin-bottom:1rem;}
.ib-blue{background:var(--kbg);color:var(--kbd);border-left:3px solid var(--kb);}
.ib-orange{background:var(--kog);color:#8A5E0A;border-left:3px solid var(--ko);}
.ib-green{background:var(--kgg);color:#2D6E2D;border-left:3px solid var(--kg);}
.toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#1E293B;color:white;padding:10px 18px;border-radius:var(--rl);font-size:13px;font-weight:600;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;}
.toast.show{opacity:1;}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.modal-bg.show{display:flex;}
.modal{background:white;border-radius:var(--rl);width:100%;max-width:440px;max-height:90vh;overflow-y:auto;padding:1.5rem;}
.modal-title{font-size:15px;font-weight:700;margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:1rem;padding-top:1rem;border-top:1px solid var(--border);}

/* CALENDAR */
.cal-day{min-height:70px;background:white;border:1px solid var(--border);border-radius:var(--r);padding:4px;cursor:pointer;transition:background 0.15s;}
.cal-day:hover{background:var(--kbg);}
.cal-day.today{border-color:var(--kb);border-width:2px;}
.cal-event{font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-class{background:#E8F5FC;color:#1478A8;}.ev-oneonone{background:#EBF7EB;color:#3D8B3D;}
.ev-assessment{background:#FCEBEB;color:#A32D2D;}.ev-event{background:#FEF3E2;color:#B07318;}

/* CLAIRE */
.claire-wrap{background:linear-gradient(160deg,#0E3A5C,#1A6B9A,#0D2E4A);border-radius:20px;padding:1.5rem;color:white;}
.claire-bubble{max-width:88%;border-radius:14px;padding:10px 14px;font-size:13px;line-height:1.6;}
.claire-from-claire{align-items:flex-start;}
.claire-from-claire .claire-bubble{background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.25);border-radius:4px 14px 14px 14px;color:white;}
.claire-from-me{align-items:flex-end;}
.claire-from-me .claire-bubble{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);border-radius:14px 4px 14px 14px;color:white;}
.claire-tip{margin-top:8px;padding-top:8px;border-top:1px solid rgba(56,189,248,0.2);font-size:11px;color:#7DD3F8;font-style:italic;}

/* QUIZ */
.quiz-opt{display:block;background:var(--gray);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:8px;cursor:pointer;font-size:13px;transition:all 0.15s;}
.quiz-opt:hover{border-color:var(--kb);background:var(--kbg);}
.quiz-opt.correct{background:var(--kgg);border-color:var(--kg);color:#3D8B3D;}
.quiz-opt.wrong{background:var(--rg);border-color:var(--rd);color:var(--rd);}

@media(max-width:640px){.portal-sidebar{width:100%;height:auto;position:relative;}.portal-main{margin-left:0;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <div style="text-align:center;margin-bottom:1.5rem;">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="160" height="104" style="display:block;margin:0 auto;">
        <path d="M 18 80 Q 55 22 138 48" stroke="#5CB85C" stroke-width="5.5" fill="none" stroke-linecap="round"/>
        <circle cx="90" cy="20" r="8" fill="#F5A623"/>

        <line x1="77" y1="54" x2="71" y2="68" stroke="#F5A623" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="100" y1="54" x2="106" y2="68" stroke="#F5A623" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="117" cy="14" r="7" fill="#E05A5A"/>
        <path d="M117 21 Q108 30 106 44 Q115 40 126 44 Q130 30 117 21Z" fill="#E05A5A"/>

    <div style="display:none;color:var(--rd);font-size:12px;background:var(--rg);padding:8px;border-radius:var(--r);margin-bottom:12px;" id="login-err">Código incorrecto. Consultá a tu trainer.</div>
    <div class="form-group"><label class="form-label">Tu nombre</label><input class="inp" id="l-name" placeholder="Tu nombre completo" autocomplete="name"></div>

    <button class="btn btn-blue" style="width:100%;justify-content:center;margin-top:4px;" onclick="doLogin()"><i class="ti ti-login"></i>Ingresar</button>
  </div>
</div>

<!-- PORTAL -->
<div id="portal-app" style="display:none;">
  <div class="portal-wrap">
    <div class="portal-sidebar">
      <div class="ps-header">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60" height="36">
          <path d="M 6 38 Q 26 10 68 24" stroke="white" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8"/>
          <circle cx="46" cy="9" r="4.5" fill="white" opacity="0.9"/>
          <path d="M46 13.5 Q41 19 39 28 Q46 25 52 28 Q54 19 46 13.5Z" fill="white" opacity="0.9"/>
          <circle cx="60" cy="6" r="3.5" fill="rgba(255,255,255,0.7)"/>
          <path d="M60 9.5 Q56 15 55 23 Q60 21 66 23 Q68 15 60 9.5Z" fill="rgba(255,255,255,0.7)"/>
          <text x="74" y="28" font-family="Arial Black,Arial" font-weight="900" font-size="18" fill="white">KAMUK</text>
          <text x="76" y="44" font-family="Arial,sans-serif" font-weight="700" font-size="14" fill="#FDE68A">school</text>
        </svg>
        <div class="ps-name" id="ps-name">—</div>
        <div class="ps-level" id="ps-level">—</div>
      </div>
      <div class="ps-nav">
        <div class="ps-item active" onclick="switchTab('progreso',this)"><i class="ti ti-chart-radar"></i>Mi progreso</div>
        <div class="ps-item" onclick="switchTab('training',this)"><i class="ti ti-dumbbell"></i>Training Book</div>
        <div class="ps-item" onclick="switchTab('calendar',this)"><i class="ti ti-calendar"></i>Mi calendario</div>
        <div class="ps-item" onclick="switchTab('recursos',this)"><i class="ti ti-keyboard"></i>Recursos</div>
        <div class="ps-item" onclick="switchTab('notas',this)"><i class="ti ti-notes"></i>Mis notas</div>
        <div class="ps-item" onclick="switchTab('claire',this)"><i class="ti ti-robot"></i>Claire</div>
        <div class="ps-item" id="nav-nexora" style="display:none;" onclick="switchTab('nexora',this)"><i class="ti ti-rocket"></i>Nexora Lab</div>
      </div>
      <div class="ps-footer">
        <div class="ps-score">
          <div class="ps-score-num" id="ps-score">0</div>
          <div class="ps-score-label">/ 25 — Score actual</div>
        </div>
        <div class="ps-logout" onclick="doLogout()"><i class="ti ti-logout"></i>Salir</div>
      </div>
    </div>
    <div class="portal-main" id="portal-main">
      <div style="text-align:center;padding:3rem;color:var(--t3);">Cargando...</div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modal-event">
  <div class="modal">
    <div class="modal-title"><i class="ti ti-calendar-plus" style="color:var(--kb);"></i>Evento</div>
    <input type="hidden" id="pev-id">
    <div class="form-group"><label class="form-label">Título</label><input class="inp" id="pev-title" placeholder="Ej: Sesión con trainer, Estudiar..."></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      <div class="form-group"><label class="form-label">Fecha</label><input class="inp" id="pev-date" type="date"></div>
      <div class="form-group"><label class="form-label">Hora</label><input class="inp" id="pev-time" type="time" value="09:00"></div>
    </div>
    <div class="form-group"><label class="form-label">Tipo</label>
      <select class="inp" id="pev-type">
        <option value="class">Clase / Sesión</option>
        <option value="oneonone">1-on-1 con trainer</option>
        <option value="assessment">Evaluación</option>
        <option value="event">Otro</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">Notas</label><textarea class="inp" id="pev-notes" placeholder="Detalles..."></textarea></div>
    <div class="modal-footer">
      <button class="btn-sm btn" style="background:var(--rg);color:var(--rd);border:none;margin-right:auto;display:none;" id="pev-del" onclick="delPortalEvent()"><i class="ti ti-trash"></i>Eliminar</button>
      <button class="btn btn-outline" onclick="closeModal('modal-event')">Cancelar</button>
      <button class="btn btn-blue" onclick="savePortalEvent()"><i class="ti ti-check"></i>Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var SUPA_URL='https://lbspgbeqtcnjrbhiuucu.supabase.co';
var SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxic3BnYmVxdGNuanJiaGl1dWN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwNDgzNzgsImV4cCI6MjA5NjYyNDM3OH0.j1NRrwxmCVipIlHgEPhkdQQfnhMZVK713mFq8LnvufM';
var CLAIRE_BACKEND='https://alice-by-infinity.onrender.com/alice';
var CLAIRE_SECRET='otro-secreto-distinto-2026';

async function dbGet(t){try{var r=await fetch(SUPA_URL+'/rest/v1/'+t+'?select=id,data',{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});return r.ok?r.json():[];}catch(e){return[];}}
async function dbSet(t,id,data){try{var r=await fetch(SUPA_URL+'/rest/v1/'+t,{method:'POST',headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},body:JSON.stringify({id,data,updated_at:new Date().toISOString()})});return r.ok;}catch(e){return false;}}

// ── STATE ───────────────────────────────────────────────
var STUDENT=null;
var NEXORA_CONFIG=null;
var PORTAL_EVENTS={};
var _claire={history:[],active:false,evaluation:null,listening:false,synth:window.speechSynthesis||null};

var KN={IG:'Idea Generation',ST:'Structural Thinking',RA:'Recovery Ability',PS:'Problem Solving',R:'Responsiveness'};
var KC={1:'#A32D2D',2:'#B07318',3:'#1478A8',4:'#3D8B3D',5:'#085041'};
var KT={1:['#FCEBEB','#A32D2D','Very Weak'],2:['#FEF3E2','#B07318','Below Exp.'],3:['#E8F5FC','#1478A8','Functional'],4:['#EBF7EB','#3D8B3D','Strong'],5:['#E8F5FC','#085041','Excellent']};

function getScore(s){var k=(s.kpis&&s.kpis.phase1)||{};return Object.values(k).reduce(function(a,b){return a+(parseInt(b)||0);},0);}
function getLevel(sc){if(sc<=10)return'Survival';if(sc<=15)return'Emerging';if(sc<=20)return'Functional';return'Advanced';}
function lvBadge(l){var m={Advanced:'b-adv',Functional:'b-func',Emerging:'b-emer',Survival:'b-surv'};return'<span class="badge '+(m[l]||'b-func')+'">'+l+'</span>';}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit',year:'numeric'});}catch(e){return d;}}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function showModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}

// ── LOGIN — retiene sesión en localStorage ──────────────
async function doLogin(){
  var name=document.getElementById('l-name').value.trim();
  var code=document.getElementById('l-code').value.trim().toUpperCase();
  if(!name||!code){showToast('Completá los dos campos');return;}
  var rows=await dbGet('kamuk_students');
  var match=null;
  rows.forEach(function(r){
    if(r.data&&r.id===code){
      var sName=(r.data.info&&r.data.info.name||'').toLowerCase();
      var inputFirst=name.toLowerCase().split(' ')[0];
      if(sName.includes(inputFirst)||inputFirst.includes(sName.split(' ')[0])){
        r.data.id=r.id; match=r.data;
      }
    }
  });
  // Si no match por nombre, intentar solo por código
  if(!match){
    var byCode=rows.find(function(r){return r.id===code;});
    if(byCode){byCode.data.id=byCode.id;match=byCode.data;}
  }
  if(!match){document.getElementById('login-err').style.display='block';return;}
  STUDENT=match;
  // Cargar Nexora config y eventos del portal
  var sr=await dbGet('kamuk_sessions');
  sr.forEach(function(r){
    if(r.id==='NEXORA-CONFIG'&&r.data)NEXORA_CONFIG=r.data;
    if(r.id==='PORTAL-EVENTS-'+STUDENT.id&&r.data)PORTAL_EVENTS=r.data;
  });
  // Retener sesión
  try{localStorage.setItem('kamuk_portal_session',JSON.stringify({code,name,ts:Date.now()}));}catch(e){}
  startPortal();
}

async function tryRestoreSession(){
  try{
    var saved=localStorage.getItem('kamuk_portal_session');
    if(!saved)return false;
    var sess=JSON.parse(saved);
    if(Date.now()-sess.ts>24*60*60*1000){localStorage.removeItem('kamuk_portal_session');return false;}
    var rows=await dbGet('kamuk_students');
    var r=rows.find(function(r){return r.id===sess.code;});
    if(!r)return false;
    r.data.id=r.id;STUDENT=r.data;
    var sr=await dbGet('kamuk_sessions');
    sr.forEach(function(r){
      if(r.id==='NEXORA-CONFIG'&&r.data)NEXORA_CONFIG=r.data;
      if(r.id==='PORTAL-EVENTS-'+STUDENT.id&&r.data)PORTAL_EVENTS=r.data;
    });
    startPortal();return true;
  }catch(e){return false;}
}

function doLogout(){
  STUDENT=null;NEXORA_CONFIG=null;PORTAL_EVENTS={};
  _claire={history:[],active:false,evaluation:null,listening:false,synth:window.speechSynthesis||null};
  try{localStorage.removeItem('kamuk_portal_session');}catch(e){}
  document.getElementById('portal-app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('l-code').value='';
}

function startPortal(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('portal-app').style.display='block';
  var sc=getScore(STUDENT);
  document.getElementById('ps-name').textContent=(STUDENT.info&&STUDENT.info.name)||'—';
  document.getElementById('ps-level').textContent=getLevel(sc);
  document.getElementById('ps-score').textContent=sc;
  if(STUDENT.nexoraEnabled||NEXORA_CONFIG)document.getElementById('nav-nexora').style.display='flex';
  switchTab('progreso',document.querySelector('.ps-item'));
}

// Intentar restaurar sesión al cargar
window.addEventListener('load',function(){tryRestoreSession();});

// ── NAVIGATION ──────────────────────────────────────────
function switchTab(tab,el){
  if(tab!=='claire')stopClaire();
  document.querySelectorAll('.ps-item').forEach(function(i){i.classList.remove('active');});
  if(el)el.classList.add('active');
  var m=document.getElementById('portal-main');
  if(tab==='progreso')renderProgreso(m);
  else if(tab==='training')renderTraining(m);
  else if(tab==='calendar')renderCalendar(m);
  else if(tab==='recursos')renderRecursos(m);
  else if(tab==='notas')renderNotas(m);
  else if(tab==='claire')renderClaire(m);
  else if(tab==='nexora')renderNexora(m);
}

// ── PROGRESO ────────────────────────────────────────────

function buildRadar(data,labels){
  var cx=100,cy=100,r=75,n=data.length;
  var pts=data.map(function(v,i){var a=(i/n)*Math.PI*2-Math.PI/2;return{x:cx+r*v*Math.cos(a),y:cy+r*v*Math.sin(a)};});
  var poly=pts.map(function(p){return p.x+','+p.y;}).join(' ');
  var axes=labels.map(function(l,i){var a=(i/n)*Math.PI*2-Math.PI/2;var ex=cx+r*Math.cos(a),ey=cy+r*Math.sin(a);var lx=cx+(r+16)*Math.cos(a)-8,ly=cy+(r+16)*Math.sin(a)+4;
    return'<line x1="'+cx+'" y1="'+cy+'" x2="'+ex+'" y2="'+ey+'" stroke="#E2E8F0" stroke-width="1"/><text x="'+lx+'" y="'+ly+'" font-size="10" fill="#94A3B8" font-weight="700">'+l+'</text>';}).join('');
  var rings=[0.2,0.4,0.6,0.8,1].map(function(f){var rp=labels.map(function(l,i){var a=(i/n)*Math.PI*2-Math.PI/2;return(cx+r*f*Math.cos(a))+','+(cy+r*f*Math.sin(a));}).join(' ');return'<polygon points="'+rp+'" fill="none" stroke="#E2E8F0" stroke-width="1"/>';}).join('');
  return'<svg viewBox="0 0 200 200" width="180" height="180">'+rings+axes+'<polygon points="'+poly+'" fill="rgba(27,155,209,0.15)" stroke="#1B9BD1" stroke-width="2"/></svg>';
}

var pCalYear=new Date().getFullYear(),pCalMonth=new Date().getMonth();
function renderCalendar(m){
  var today=new Date();
  var firstDay=new Date(pCalYear,pCalMonth,1);
  var lastDay=new Date(pCalYear,pCalMonth+1,0);
  var monthNames=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var days=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  var cells=[];
  for(var i=0;i<firstDay.getDay();i++)cells.push(null);
  for(var d=1;d<=lastDay.getDate();d++)cells.push(d);
  while(cells.length%7!==0)cells.push(null);

  m.innerHTML='<div style="animation:fadeIn 0.2s ease;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">'
    +'<h2 style="font-size:16px;font-weight:700;">Mi calendario</h2>'
    +'<button class="btn btn-blue btn-sm" onclick="openPortalEvent(null,null)"><i class="ti ti-plus"></i>Nuevo evento</button></div>'
    +'<div class="card" style="padding:0;overflow:hidden;">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;padding:1rem;border-bottom:1px solid var(--border);">'
    +'<button class="btn btn-outline btn-sm" onclick="pCalPrev()"><i class="ti ti-chevron-left"></i></button>'
    +'<div style="font-size:15px;font-weight:700;">'+monthNames[pCalMonth]+' '+pCalYear+'</div>'
    +'<button class="btn btn-outline btn-sm" onclick="pCalNext()"><i class="ti ti-chevron-right"></i></button></div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);background:var(--gray);padding:4px 8px;">'
    +days.map(function(d){return'<div style="font-size:11px;font-weight:700;color:var(--t3);text-align:center;padding:4px;">'+d+'</div>';}).join('')+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(7,1fr);padding:4px 8px;gap:2px;">'
    +cells.map(function(day){
      if(!day)return'<div style="min-height:70px;background:var(--gray);border-radius:var(--r);"></div>';
      var dateStr=pCalYear+'-'+(String(pCalMonth+1).padStart(2,'0'))+'-'+(String(day).padStart(2,'0'));
      var isToday=today.getFullYear()===pCalYear&&today.getMonth()===pCalMonth&&today.getDate()===day;
      var dayEvs=Object.values(PORTAL_EVENTS).filter(function(e){return e.date===dateStr;});
      var evHtml=dayEvs.map(function(e){return'<div class="cal-event ev-'+(e.type||'event')+'" onclick="event.stopPropagation();openPortalEvent(\''+e.id+'\',\''+dateStr+'\')">'+e.time+' '+e.title+'</div>';}).join('');
      return'<div class="cal-day'+(isToday?' today':'')+'" onclick="openPortalEvent(null,\''+dateStr+'\')">'
        +'<div style="font-size:12px;font-weight:700;margin-bottom:2px;color:'+(isToday?'var(--kb)':'var(--text)')+'">'+day+'</div>'+evHtml+'</div>';
    }).join('')+'</div></div>'

    +'<div class="card" style="margin-top:1rem;"><div class="card-title"><i class="ti ti-list" style="color:var(--kb);"></i>Próximos eventos</div>'
    +(Object.values(PORTAL_EVENTS).filter(function(e){return new Date(e.date)>=new Date();}).sort(function(a,b){return new Date(a.date)-new Date(b.date);}).slice(0,6)
      .map(function(e){return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">'
        +'<div style="width:38px;height:38px;border-radius:var(--r);background:var(--kbg);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--kb);flex-shrink:0;">'+new Date(e.date+'T12:00').toLocaleDateString('es-CR',{day:'2-digit',month:'2-digit'})+'</div>'
        +'<div style="flex:1;"><div style="font-size:13px;font-weight:700;">'+e.title+'</div><div style="font-size:11px;color:var(--t3);">'+(e.time||'')+'</div></div>'
        +'<button data-evid="'+e.id+'" class="btn btn-outline btn-sm" onclick="openPortalEvent(this.dataset.evid,null)"><i class="ti ti-edit"></i></button></div>';}).join('') || '<div style="color:var(--t3);font-size:13px;">Sin eventos próximos.</div>')
    +'</div></div>';
}

function pCalPrev(){pCalMonth--;if(pCalMonth<0){pCalMonth=11;pCalYear--;}renderCalendar(document.getElementById('portal-main'));}
function pCalNext(){pCalMonth++;if(pCalMonth>11){pCalMonth=0;pCalYear++;}renderCalendar(document.getElementById('portal-main'));}

function openPortalEvent(evId,dateStr){
  var ev=evId?PORTAL_EVENTS[evId]:null;
  document.getElementById('pev-id').value=evId||'';
  document.getElementById('pev-title').value=ev?ev.title:'';
  document.getElementById('pev-date').value=ev?ev.date:(dateStr||'');
  document.getElementById('pev-time').value=ev?ev.time:'09:00';
  document.getElementById('pev-type').value=ev?ev.type:'class';
  document.getElementById('pev-notes').value=ev?ev.notes:'';
  document.getElementById('pev-del').style.display=evId?'inline-flex':'none';
  showModal('modal-event');
}

async function savePortalEvent(){
  var id=document.getElementById('pev-id').value||('PEV-'+Date.now());
  PORTAL_EVENTS[id]={id,title:document.getElementById('pev-title').value.trim(),date:document.getElementById('pev-date').value,time:document.getElementById('pev-time').value,type:document.getElementById('pev-type').value,notes:document.getElementById('pev-notes').value};
  await dbSet('kamuk_sessions','PORTAL-EVENTS-'+STUDENT.id,PORTAL_EVENTS);
  closeModal('modal-event');showToast('Evento guardado');renderCalendar(document.getElementById('portal-main'));
}

async function delPortalEvent(){
  var id=document.getElementById('pev-id').value;
  if(id&&PORTAL_EVENTS[id])delete PORTAL_EVENTS[id];
  await dbSet('kamuk_sessions','PORTAL-EVENTS-'+STUDENT.id,PORTAL_EVENTS);
  closeModal('modal-event');showToast('Evento eliminado');renderCalendar(document.getElementById('portal-main'));
}

    +'</div>';

function startTyping(){
  var shuffled=TT_PHRASES.slice().sort(function(){return Math.random()-0.5;});
  var target='';var i=0;
  while(target.length<200&&i<shuffled.length){target+=(target?' ':'')+shuffled[i];i++;}
  target=target.slice(0,280);
  var DURATION=60;
  document.getElementById('tt-wrap').innerHTML='<div class="ib ib-blue" style="font-size:12px;">60s · Mayúsculas, puntuación y apóstrofes cuentan</div>'
    +'<div id="tt-target" style="font-family:monospace;font-size:13px;line-height:2;background:var(--gray);border-radius:var(--r);padding:12px;margin-bottom:10px;word-break:break-word;user-select:none;"></div>'
    +'<textarea id="tt-input" class="inp" style="min-height:80px;font-family:monospace;font-size:13px;" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" placeholder="Empezá a escribir..."></textarea>'
    +'<div style="display:flex;justify-content:space-between;margin-top:8px;"><span id="tt-timer" style="font-size:16px;font-weight:700;color:var(--kb);">60s</span><span id="tt-status" style="font-size:12px;color:var(--t3);">Listo</span></div>'
    +'<div id="tt-result"></div>';

  var targetEl=document.getElementById('tt-target');
  targetEl.innerHTML=target.split('').map(function(ch,i){var d=ch===' '?'&nbsp;':ch.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');return'<span id="tc-'+i+'" style="white-space:pre;">'+d+'</span>';}).join('');

  var input=document.getElementById('tt-input');
  var startTime=null,interval=null,finished=false,kTs=[];

  input.addEventListener('input',function(){
    if(finished)return;
    if(!startTime){startTime=Date.now();document.getElementById('tt-status').textContent='Escribiendo...';
      interval=setInterval(function(){var rem=DURATION-Math.floor((Date.now()-startTime)/1000);if(rem<=0){document.getElementById('tt-timer').textContent='0s';finish();}else document.getElementById('tt-timer').textContent=rem+'s';},250);}
    kTs.push(Date.now());
    var typed=input.value;
    for(var j=0;j<target.length;j++){var el=document.getElementById('tc-'+j);if(!el)continue;
      if(j<typed.length){el.style.background=typed[j]===target[j]?'#EBF7EB':'#FCEBEB';el.style.color=typed[j]===target[j]?'#3D8B3D':'#A32D2D';el.style.borderBottom=typed[j]===target[j]?'none':'2px solid #A32D2D';}
      else if(j===typed.length){el.style.background='rgba(27,155,209,0.2)';el.style.color='var(--kb)';el.style.borderBottom='2px solid var(--kb)';}
      else{el.style.background='';el.style.color='';el.style.borderBottom='';}}
    if(typed.length>=target.length)finish();
  });

  function finish(){
    if(finished)return;finished=true;clearInterval(interval);input.disabled=true;
    var typed=input.value;var elapsed=((Date.now()-startTime)/1000)/60||DURATION/60;
    var correct=0;for(var j=0;j<typed.length;j++){if(typed[j]===target[j])correct++;}
    var acc=typed.length?Math.round(correct/typed.length*100):0;
    var wpm=Math.round(correct/5/elapsed);
    var coord=50;if(kTs.length>2){var ints=[];for(var k=1;k<kTs.length;k++)ints.push(kTs[k]-kTs[k-1]);var mean=ints.reduce(function(a,b){return a+b;},0)/ints.length;var vari=ints.reduce(function(a,b){return a+Math.pow(b-mean,2);},0)/ints.length;coord=Math.max(0,Math.min(100,Math.round(100-Math.sqrt(vari)/8)));}
    var capE=0,punctE=0,apoE=0,letE=0;for(var j=0;j<typed.length;j++){if(typed[j]!==target[j]){var exp=target[j]||'';if(exp===exp.toUpperCase()&&exp!==exp.toLowerCase())capE++;else if(exp==="'")apoE++;else if('.,;:!?-()'.indexOf(exp)>=0)punctE++;else letE++;}}
    var wCol=wpm>=40?'#3D8B3D':wpm>=25?'#B07318':'#A32D2D';var aCol=acc>=95?'#3D8B3D':acc>=80?'#B07318':'#A32D2D';
    document.getElementById('tt-status').textContent='Finalizado';
    document.getElementById('tt-result').innerHTML='<div class="card" style="margin-top:10px;">'
      +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;text-align:center;margin-bottom:10px;">'
      +'<div><div style="font-size:28px;font-weight:800;color:'+wCol+';">'+wpm+'</div><div style="font-size:11px;color:var(--t3);">WPM</div></div>'
      +'<div><div style="font-size:28px;font-weight:800;color:'+aCol+';">'+acc+'%</div><div style="font-size:11px;color:var(--t3);">Accuracy</div></div>'
      +'<div><div style="font-size:28px;font-weight:800;color:var(--kb);">'+coord+'</div><div style="font-size:11px;color:var(--t3);">Coordination</div></div>'
      +'</div>'
      +((capE+punctE+apoE)>0?'<div class="ib ib-orange" style="font-size:12px;margin-bottom:8px;">'+(capE?capE+' mayúsculas · ':'')+(apoE?apoE+' apóstrofes · ':'')+(punctE?punctE+' puntuación':'')+'</div>':'')
      +'<button class="btn btn-blue btn-sm" onclick="startTyping()"><i class="ti ti-refresh"></i>Intentar de nuevo</button></div>';
    if(!STUDENT.typingTests)STUDENT.typingTests=[];
    STUDENT.typingTests.push({date:new Date().toISOString(),wpm,acc,coord,errors:{caps:capE,punct:punctE,apo:apoE,letters:letE}});
    dbSet('kamuk_students',STUDENT.id,STUDENT);
  }
}

  {q:'If someone did not understand you, what should you do?',opts:['Repeat exactly the same thing louder','Say it with simpler and different words','Change the topic','Speak in Spanish'],ans:1,tip:'Reformulating with simpler vocabulary usually resolves clarity issues.'},
  {q:'Which of these is a CONTRAST connector?',opts:['on top of that','however','as well as','once that'],ans:1,tip:'"However" marks contrast — key in the Nexus Method.'},
  {q:'You answered only "Yes." What is missing?',opts:['Nothing, it is complete','Expand: "Yes, because... and on top of that..."','Say "No" instead','Switch languages'],ans:1,tip:'Every short answer must be expanded: Idea + Linker + Idea.'},
  {q:'What makes a story sound connected instead of random?',opts:['Speaking very fast','Using linkers between ideas (so, however, then...)','Repeating the same word','Making long pauses'],ans:1,tip:'Linkers are the "glue" between ideas.'},
  {q:'Which phrase sounds more confident?',opts:['"Maybe I think... I don\'t know..."','"I really think that..., in my experience..."','"I guess so, sorry."','"Whatever you say."'],ans:1,tip:'Phrases like "I really think that..." convey conviction.'}
];
function startQuiz(){
  var pool=QUIZ_BANK.slice().sort(function(){return Math.random()-0.5;}).slice(0,6);
  window._quiz=pool;
  document.getElementById('quiz-wrap').innerHTML='<div class="ib ib-orange" style="font-size:12px;">'+pool.length+' preguntas · No afecta tus KPIs</div>'
    +pool.map(function(item,i){return'<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px;">'+(i+1)+'. '+item.q+'</div>'
      +item.opts.map(function(opt,j){return'<label class="quiz-opt"><input type="radio" name="qz-'+i+'" value="'+j+'" style="margin-right:8px;">'+opt+'</label>';}).join('')
      +'</div>';}).join('')
    +'<button class="btn btn-orange" onclick="submitQuiz()"><i class="ti ti-check"></i>Enviar respuestas</button>'
    +'<div id="quiz-result" style="margin-top:10px;"></div>';
}
function submitQuiz(){
  var pool=window._quiz||[];var correct=0;
  var detail=pool.map(function(item,i){var sel=document.querySelector('input[name="qz-'+i+'"]:checked');var v=sel?parseInt(sel.value):-1;var ok=v===item.ans;if(ok)correct++;
    return'<div style="background:'+(ok?'var(--kgg)':'var(--rg)')+';border-radius:var(--r);padding:8px 10px;margin-bottom:6px;font-size:12px;"><strong>'+(i+1)+'. '+(ok?'✓ Correcto':'✗ '+(v===-1?'Sin responder':'Incorrecto'))+'</strong><div style="margin-top:4px;">'+item.tip+'</div></div>';}).join('');
  document.getElementById('quiz-result').innerHTML='<div class="card"><div style="text-align:center;font-size:28px;font-weight:800;color:var(--kb);margin-bottom:8px;">'+correct+'/'+pool.length+'</div>'+detail+'<button class="btn btn-orange btn-sm" style="margin-top:8px;" onclick="startQuiz()"><i class="ti ti-refresh"></i>Nuevo quiz</button></div>';
}

// ── CLAIRE ───────────────────────────────────────────────
function renderClaire(m){
  m.innerHTML='<div style="animation:fadeIn 0.2s ease;">'
    +'<div class="claire-wrap">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.25rem;">'
    +'<div><div style="font-size:10px;letter-spacing:0.2em;color:rgba(255,255,255,0.4);margin-bottom:4px;">KAMUK SCHOOL</div>'
    +'<div style="font-size:28px;font-weight:900;color:#7DD3F8;letter-spacing:0.05em;text-shadow:0 0 24px rgba(125,211,248,0.4);">CLAIRE</div>'
    +'<div style="font-size:12px;color:rgba(255,255,255,0.55);">Tu tutora de inglés operacional · Powered by Studio Infinity CR</div></div>'
    +'<select onchange="_claire.accent=this.value" style="background:rgba(255,255,255,0.1);border:1px solid rgba(56,189,248,0.3);color:white;border-radius:var(--r);padding:4px 8px;font-size:11px;">'
    +'<option value="american">American</option><option value="british">British</option><option value="indian">Indian English</option></select>'
    +'</div>'

}

var _claire={history:[],active:false,evaluation:null,listening:false,synth:window.speechSynthesis||null,accent:'american'};

function renderClaireStart(){
  return'<div style="text-align:center;">'
    +'<div style="background:rgba(255,255,255,0.06);border:1px solid rgba(125,211,248,0.15);border-radius:14px;padding:1.25rem;margin-bottom:1.25rem;font-size:13px;color:rgba(255,255,255,0.75);line-height:1.8;">'
    +'Claire practica inglés operacional contigo, basado en tu Training Book y los ejercicios asignados. Podés hablar o escribir en inglés.</div>'
    +'<button style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#38BDF8,#0EA5E9);border:none;color:white;font-weight:800;font-size:15px;padding:14px 32px;border-radius:14px;cursor:pointer;box-shadow:0 4px 16px rgba(56,189,248,0.4);" onclick="startClaireSession()"><i class="ti ti-player-play"></i>Iniciar sesión con Claire</button>'
    +(_claire.evaluation?'<div style="margin-top:1.25rem;">'+renderClaireEval()+'</div>':'')
    +'</div>';
}

function renderClaireSession(){
  var msgs=_claire.history.map(function(msg){
    var isC=msg.role==='assistant';
    var raw=msg.content,clientPart=raw,tip='';
    var sp=raw.match(/([\s\S]*?)\nALICE:\s*([\s\S]*)/);
    if(sp&&isC){clientPart=sp[1].trim();tip=sp[2].trim();}
    return'<div class="claire-msg '+(isC?'claire-from-claire':'claire-from-me')+'" style="display:flex;flex-direction:column;margin-bottom:12px;">'
      +(isC?'<div style="font-size:10px;color:#7DD3F8;font-weight:800;margin-bottom:3px;">CLAIRE</div>':'<div style="font-size:10px;color:rgba(255,255,255,0.4);font-weight:600;margin-bottom:3px;align-self:flex-end;">VOS</div>')
      +'<div class="claire-bubble">'+clientPart
      +(tip?'<div class="claire-tip">💬 Claire: '+tip+'</div>':'')
      +'</div></div>';
  }).join('');

  return'<div>'
    +'<div id="claire-msgs" style="max-height:340px;overflow-y:auto;margin-bottom:12px;display:flex;flex-direction:column;">'+msgs+'</div>'
    +'<div id="claire-status" style="font-size:12px;color:#7DD3F8;text-align:center;min-height:16px;margin-bottom:8px;font-weight:600;"></div>'
    +'<div style="display:flex;gap:8px;align-items:center;">'
    +'<input id="claire-input" style="flex:1;background:rgba(255,255,255,0.07);border:1px solid rgba(56,189,248,0.25);color:white;border-radius:12px;padding:10px 14px;font-size:13px;font-family:inherit;" placeholder="Respondé en inglés..." onkeydown="if(event.key===\'Enter\')sendClaireMsg();">'
    +'<button id="claire-mic" style="width:44px;height:44px;background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:#7DD3F8;border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;" onclick="toggleClaireMic()"><i class="ti ti-microphone"></i></button>'
    +'<button style="width:44px;height:44px;background:linear-gradient(135deg,#38BDF8,#0EA5E9);border:none;color:white;border-radius:12px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;" onclick="sendClaireMsg()"><i class="ti ti-send"></i></button>'
    +'</div>'
    +'<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">'
    +'<button style="flex:1;min-width:120px;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:rgba(134,239,172,0.1);border:1px solid rgba(134,239,172,0.25);color:#86EFAC;font-size:12px;padding:8px;border-radius:10px;cursor:pointer;" onclick="endClaireSession()"><i class="ti ti-check"></i>Terminar y evaluar</button>'
    +'<button style="flex:1;min-width:120px;display:inline-flex;align-items:center;justify-content:center;gap:6px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.55);font-size:12px;padding:8px;border-radius:10px;cursor:pointer;" onclick="cancelClaireSession()"><i class="ti ti-x"></i>Cancelar</button>'
    +'</div></div>';
}

function renderClaireEval(){
  var ev=_claire.evaluation;if(!ev)return'';
  var col=ev.overall_score>=80?'#86EFAC':ev.overall_score>=60?'#FCD34D':'#FCA5A5';
  return'<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(56,189,248,0.15);border-radius:14px;padding:1.25rem;text-align:left;">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;"><span style="font-size:13px;font-weight:700;color:white;">Resultado</span>'
    +'<span style="font-size:28px;font-weight:900;color:'+col+';">'+ev.overall_score+'<span style="font-size:12px;color:rgba(255,255,255,0.4);">/100</span></span></div>'
    +(ev.alice_message?'<div style="font-size:13px;color:rgba(255,255,255,0.85);line-height:1.7;background:rgba(56,189,248,0.08);border-left:3px solid #38BDF8;padding:8px 12px;border-radius:0 10px 10px 0;margin-bottom:10px;">'+ev.alice_message+'</div>':'')
    +(ev.best_moment?'<div style="font-size:12px;color:#86EFAC;margin-bottom:4px;">✓ '+ev.best_moment+'</div>':'')
    +(ev.main_improvement?'<div style="font-size:12px;color:#FCA5A5;margin-bottom:10px;">▴ '+ev.main_improvement+'</div>':'')
    +'<button style="display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#38BDF8,#0EA5E9);border:none;color:white;font-weight:700;font-size:13px;padding:10px 24px;border-radius:12px;cursor:pointer;" onclick="startClaireSession()"><i class="ti ti-refresh"></i>Nueva sesión</button>'
    +'</div>';
}

async function startClaireSession(){
  stopClaire();
  _claire.history=[];_claire.evaluation=null;_claire.active=true;
  renderClaire(document.getElementById('portal-main'));
  var st=document.getElementById('claire-status');if(st)st.textContent='Claire está preparando tu sesión...';
  try{
    var tb=(STUDENT.trainingBook||[]).slice(0,4).map(function(ex){return'- '+ex.title+': '+ex.studentTask;}).join('\n');
    var r=await fetch(CLAIRE_BACKEND,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode:'start_session',student:{id:STUDENT.id,name:(STUDENT.info&&STUDENT.info.name)||'Student',level:'Functional',trainingBook:STUDENT.trainingBook||[]},secret:CLAIRE_SECRET})});
    var data=await r.json();
    var opening=data.opening||'';
    _claire.history.push({role:'assistant',content:opening});
    claireSpeak(opening.split('\nALICE:')[0]);
    renderClaire(document.getElementById('portal-main'));scrollClaire();
    var st2=document.getElementById('claire-status');if(st2)st2.textContent='';
  }catch(e){var st3=document.getElementById('claire-status');if(st3)st3.textContent='Error conectando con Claire.';}
}

async function sendClaireMsg(){
  var input=document.getElementById('claire-input');
  var text=input?input.value.trim():'';if(!text)return;
  input.value='';
  _claire.history.push({role:'user',content:text});
  renderClaire(document.getElementById('portal-main'));scrollClaire();
  var st=document.getElementById('claire-status');if(st)st.textContent='Claire está respondiendo...';
  try{
    var r=await fetch(CLAIRE_BACKEND,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode:'chat',student:{id:STUDENT.id,name:(STUDENT.info&&STUDENT.info.name)||'Student',level:'Functional',trainingBook:STUDENT.trainingBook||[]},
        history:_claire.history.slice(-12),message:text,secret:CLAIRE_SECRET})});
    var data=await r.json();
    var reply=data.reply||'Could you try again?';
    _claire.history.push({role:'assistant',content:reply});
    claireSpeak(reply.split('\nALICE:')[0].trim());
    if(data.limitReached)_claire.active=false;
    renderClaire(document.getElementById('portal-main'));scrollClaire();
    var st2=document.getElementById('claire-status');if(st2)st2.textContent='';
  }catch(e){var st3=document.getElementById('claire-status');if(st3)st3.textContent='Error conectando con Claire.';}
}

async function endClaireSession(){
  stopClaire();
  var st=document.getElementById('claire-status');if(st)st.textContent='Claire está evaluando tu sesión...';
  try{
    var r=await fetch(CLAIRE_BACKEND,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({mode:'evaluate',student:{id:STUDENT.id,name:(STUDENT.info&&STUDENT.info.name)||'Student',level:'Functional'},history:_claire.history,secret:CLAIRE_SECRET})});
    var data=await r.json();
    _claire.evaluation=data.evaluation;_claire.active=false;
    if(!STUDENT.aliceSessions)STUDENT.aliceSessions=[];
    STUDENT.aliceSessions.push({date:new Date().toISOString(),score:(_claire.evaluation&&_claire.evaluation.overall_score)||0,turns:_claire.history.length});
    await dbSet('kamuk_students',STUDENT.id,STUDENT);
    if(_claire.evaluation&&_claire.evaluation.alice_message)claireSpeak(_claire.evaluation.alice_message);
    renderClaire(document.getElementById('portal-main'));
  }catch(e){var st2=document.getElementById('claire-status');if(st2)st2.textContent='Error al evaluar.';}
}

function cancelClaireSession(){stopClaire();_claire.active=false;_claire.history=[];renderClaire(document.getElementById('portal-main'));}
function scrollClaire(){setTimeout(function(){var el=document.getElementById('claire-msgs');if(el)el.scrollTop=el.scrollHeight;},50);}

function claireSpeak(text){
  var synth=_claire.synth;if(!synth)return;
  synth.cancel();
  var clean=text.replace(/[*_💡🎯💬]/g,'').replace(/ALICE:|GOOD:|TIP:/g,'').trim();
  if(!clean)return;
  var utt=new SpeechSynthesisUtterance(clean);
  utt.lang='en-US';utt.rate=0.9;utt.pitch=1.05;
  var voices=synth.getVoices();
  var v=voices.find(function(v){return v.lang==='en-US'&&/female|woman|samantha|zira/i.test(v.name);})||voices.find(function(v){return v.lang==='en-US';})||voices[0];
  if(v)utt.voice=v;
  synth.speak(utt);
}

function stopClaire(){
  if(_claire.synth)_claire.synth.cancel();
  if(_claire.recognition){try{_claire.recognition.stop();}catch(e){}}
  _claire.listening=false;
}

function toggleClaireMic(){
  if(_claire.listening){
    if(_claire.recognition)try{_claire.recognition.stop();}catch(e){}
    _claire.listening=false;
    var btn=document.getElementById('claire-mic');
    if(btn){btn.style.background='rgba(56,189,248,0.1)';btn.style.borderColor='rgba(56,189,248,0.3)';btn.style.color='#7DD3F8';}
    return;
  }
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){showToast('Usá Chrome o Edge para el micrófono');return;}
  if(_claire.synth)_claire.synth.cancel();
  var rec=new SR();rec.lang='en-US';rec.interimResults=true;rec.continuous=false;
  _claire.recognition=rec;_claire.listening=true;
  var btn=document.getElementById('claire-mic');
  if(btn){btn.style.background='rgba(255,92,92,0.3)';btn.style.borderColor='#FF5C5C';btn.style.color='white';}
  var st=document.getElementById('claire-status');if(st)st.textContent='🎤 Escuchando...';
  rec.onresult=function(e){var t=Array.from(e.results).map(function(r){return r[0].transcript;}).join('');var inp=document.getElementById('claire-input');if(inp)inp.value=t;};
  rec.onend=function(){_claire.listening=false;var btn2=document.getElementById('claire-mic');if(btn2){btn2.style.background='rgba(56,189,248,0.1)';btn2.style.borderColor='rgba(56,189,248,0.3)';btn2.style.color='#7DD3F8';}var inp=document.getElementById('claire-input');if(inp&&inp.value.trim())sendClaireMsg();};
  rec.onerror=function(){_claire.listening=false;};
  rec.start();
}

if(window.speechSynthesis){window.speechSynthesis.onvoiceschanged=function(){window.speechSynthesis.getVoices();};}
